name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# .godot-version pins the supported 4.7 family. CI uses the P0-017 baseline
# patch release so exports use matching editor and template binaries.
env:
  GODOT_VERSION_FAMILY: "4.7"
  GODOT_CI_VERSION: "4.7.1"

jobs:
  validate-and-smoke:
    name: Validate, import, and startup smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout LFS pointers
        uses: actions/checkout@v4

      - name: Restore runtime Git LFS assets
        run: tools/restore_lfs_assets.sh runtime

      - name: Check Godot version pins
        run: |
          set -euo pipefail
          test "$(cat .godot-version)" = "$GODOT_VERSION_FAMILY"
          grep -F 'config/features=PackedStringArray("4.7", "GL Compatibility")' project.godot
          grep -F 'config/icon="res://scenes/menu/logo256.png"' project.godot
          grep -F 'application/icon="res://scenes/menu/logo256.png"' export_presets.cfg
          grep -F 'application/bundle_identifier="com.revalrebel.game"' export_presets.cfg
          test -s scenes/menu/logo256.png

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_CI_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Verify tools
        run: |
          set -euo pipefail
          godot --version
          python3 --version

      - name: Verify checked Godot runner
        run: test -x tools/run_godot_checked.sh

      - name: Clean headless import
        run: tools/run_godot_checked.sh clean-import godot --headless --editor --quit

      - name: Main scene startup smoke
        run: tools/run_godot_checked.sh main-scene godot --headless --quit-after 5

      - name: Playable room parser/startup smoke
        run: tools/run_godot_checked.sh playable-room godot --headless --quit-after 5 scenes/reval_east/reval_east.tscn

      - name: Godot headless tests
        run: tools/run_godot_checked.sh --require-test-summary full-suite godot --headless --script tools/run_godot_tests.gd

      - name: Map parser smoke
        run: tools/run_map_pipeline_ci.sh parser

      - name: Map compiler and semantic validation smoke
        run: tools/run_map_pipeline_ci.sh compiler

      - name: Blueprint registry completeness audit
        run: tools/run_map_pipeline_ci.sh audit

      - name: Stable-ID persistence smoke
        run: tools/run_map_pipeline_ci.sh persistence

      - name: Map parity, routes, and canonical-consumer smoke
        run: tools/run_map_pipeline_ci.sh parity

      - name: Large-map benchmark smoke
        run: tools/run_map_pipeline_ci.sh benchmark-smoke

      - name: Seeded Godot test failure fails
        run: |
          set -euo pipefail
          seeded_test="tests/godot/test_seeded_failure.gd"
          cleanup_seeded_test() {
            rm -f "$seeded_test"
          }
          trap cleanup_seeded_test EXIT

          cat > "$seeded_test" <<'GDSCRIPT'
          extends "res://tests/godot/test_case.gd"

          func test_seeded_failure() -> void:
              fail("Seeded CI failure must make the harness exit nonzero")
          GDSCRIPT

          if tools/run_godot_checked.sh --require-test-summary seeded-assertion \
            godot --headless --script tools/run_godot_tests.gd -- --filter=test_seeded_failure; then
            echo "Seeded Godot test failure unexpectedly passed" >&2
            exit 1
          fi

          cleanup_seeded_test
          trap - EXIT

      - name: Verify historical environment dossier
        run: python3 tools/verify_historical_dossier.py

      - name: Verify tourist landmarks and narrative manifests
        run: |
          set -euo pipefail
          python3 tools/generate_tourist_landmarks.py --check
          python3 tools/verify_tourist_landmarks.py
          python3 tools/generate_landmark_narrative.py --check
          python3 tools/verify_landmark_narrative.py
          python3 tools/verify_quest_packages.py
          python3 tools/generate_quest_package_tests.py --check

      - name: Active Markdown links and validation
        run: python3 tools/generate_active_docs_report.py --check

      - name: Active Markdown seeded fixtures
        run: |
          set -euo pipefail
          python3 tools/generate_active_docs_report.py --fixture clean
          if python3 tools/generate_active_docs_report.py --fixture invalid; then
            echo "Invalid active-doc fixture unexpectedly passed" >&2
            exit 1
          fi

      - name: Verify Git LFS retrieval and manifest
        run: |
          python3 tools/manage_lfs_assets.py verify
          python3 tools/manage_lfs_assets.py verify --scope runtime --require-materialized

      - name: Repository storage hygiene
        run: python3 tools/verify_storage_hygiene.py

      - name: Asset source manifest coverage
        run: |
          python3 tools/validate_asset_sources.py
          python3 tools/verify_slice_surface_assets.py
          python3 tools/quarantine_assets.py --check
          python3 tools/generate_asset_inventory.py --check

      - name: Seeded manifest coverage error fails
        run: |
          set -euo pipefail
          backup="$RUNNER_TEMP/SOURCES.csv.backup"
          cp assets/SOURCES.csv "$backup"
          restore_manifest() {
            cp "$backup" assets/SOURCES.csv
          }
          trap restore_manifest EXIT

          python3 - <<'PY'
          from pathlib import Path
          path = Path("assets/SOURCES.csv")
          lines = path.read_text(encoding="utf-8").splitlines()
          if len(lines) < 3:
              raise SystemExit("assets/SOURCES.csv fixture needs at least two data rows")
          path.write_text("\n".join([lines[0], *lines[2:]]) + "\n", encoding="utf-8")
          PY

          if python3 tools/validate_asset_sources.py; then
            echo "Seeded manifest coverage error unexpectedly passed" >&2
            exit 1
          fi

          restore_manifest
          trap - EXIT

      - name: Verify Godot harness error gates
        run: GODOT_BIN=godot tools/test_godot_harness.sh

  desktop-export-smoke:
    name: macOS desktop export smoke
    runs-on: macos-latest
    needs: validate-and-smoke
    timeout-minutes: 30

    steps:
      - name: Checkout LFS pointers
        uses: actions/checkout@v4

      - name: Restore runtime Git LFS assets
        run: tools/restore_lfs_assets.sh runtime

      - name: Check Godot version pins
        run: |
          set -euo pipefail
          test "$(cat .godot-version)" = "$GODOT_VERSION_FAMILY"
          grep -F 'config/features=PackedStringArray("4.7", "GL Compatibility")' project.godot
          grep -F 'config/icon="res://scenes/menu/logo256.png"' project.godot
          grep -F 'application/icon="res://scenes/menu/logo256.png"' export_presets.cfg
          grep -F 'application/bundle_identifier="com.revalrebel.game"' export_presets.cfg
          test -s scenes/menu/logo256.png

      - name: Set up Godot with export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_CI_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Verify Godot
        run: godot --version

      - name: Clean headless import
        run: godot --headless --editor --quit

      - name: Export rr macOS preset
        run: |
          set -euo pipefail
          mkdir -p build
          godot --headless --export-release "rr" ./build/rr.dmg
          test -s ./build/rr.dmg

      - name: Upload export smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: rr-macos-export-smoke
          path: build/rr.dmg
          retention-days: 3
